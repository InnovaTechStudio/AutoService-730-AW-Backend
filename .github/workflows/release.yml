name: Build and Release ASP.NET Core

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:

      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restaurar dependencias
        run: dotnet restore AutoServiceAW.API/AutoServiceAW.API.csproj

      - name: Compilar
        run: dotnet build AutoServiceAW.API/AutoServiceAW.API.csproj --configuration Release --no-restore

      - name: Publicar
        run: dotnet publish AutoServiceAW.API/AutoServiceAW.API.csproj --configuration Release --no-build --output publish

      - name: Comprimir publicación
        run: |
          cd publish
          zip -r ../AutoServiceAW.zip .

      - name: Crear Release y subir ZIP
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: AutoServiceAW.zip